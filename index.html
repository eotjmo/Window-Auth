<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="styles/style.css">
</head>
<body>
    <main>
        <section id="auth-window">
            <div id="sign-in">
            <aside>
                <h1>Welcome Back!</h1>
                <h3>To keep connected with us please login<br>with your personal info.
                </h3>
                <button id="sign-in-inactive-button">SIGN IN</button>
            </aside>
            <div id="create-account">
                <h1>Create Account</h1>
                <input class="input-text" id="name-input" type="text" placeholder="Name">
                <input class="input-text" id="email-input" type="email" placeholder="Email">
                <input class="input-text" id="password-input" type="password" placeholder="Password">
                <button id="sign-up-active-button">SIGN UP</button>
            </div>
        </div>
        </section>
    </main>
    <script src="javascript/main.js"></script>
</body>
</html>
